<!DOCTYPE html>
<html>
<head>
  <title>Dota Guess</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      margin: 0;
      padding: 10px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .settings {
      margin-bottom: 10px;
      font-size: 14px;
    }

    input {
      padding: 12px;
      width: 260px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    .suggestions {
      width: 260px;
      margin: auto;
      background: #1e293b;
      border-radius: 8px;
      overflow: hidden;
    }

    .suggestion {
      padding: 10px;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .suggestion:hover {
      background: #334155;
    }

    .suggestion img {
      width: 32px;
      margin-right: 10px;
      border-radius: 4px;
    }

    .table {
      margin-top: 20px;
      display: inline-block;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .cell {
      width: 110px;
      padding: 10px;
      margin: 3px;
      border-radius: 8px;
      font-size: 14px;
    }

    .green { background: #22c55e; }
    .yellow { background: #eab308; color: black; }
    .red { background: #ef4444; }

    .header .cell {
      background: #1e293b;
      font-weight: bold;
    }

    #winScreen {
      display: none;
      margin-top: 20px;
      font-size: 22px;
    }

    button {
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>Угадай героя Dota 2</h1>

<!-- ⚙️ НАСТРОЙКИ -->
<div class="settings">
<label><input type="checkbox" id="gender" checked> Пол</label>
<label><input type="checkbox" id="race" checked> Раса</label>
<label><input type="checkbox" id="roles" checked> Роль</label>
<label><input type="checkbox" id="attr" checked> Атрибут</label>
<label><input type="checkbox" id="complexity" checked> Сложность</label>
<label><input type="checkbox" id="attack" checked> Атака</label>
<label><input type="checkbox" id="year" checked> Год</label>
</div>

<input id="input" placeholder="Начни вводить..." oninput="showSuggestions()">
<div id="suggestions" class="suggestions"></div>

<div class="table" id="board">
  <div class="row header" id="headerRow">
    <div class="cell">Пол</div>
    <div class="cell">Раса</div>
    <div class="cell">Роль</div>
    <div class="cell">Атрибут</div>
    <div class="cell">Сложн.</div>
    <div class="cell">Атака</div>
    <div class="cell">Год</div>
  </div>
</div>

<div id="winScreen">
  🎉 ПОБЕДА! 🎉<br>
  <button onclick="startGame()">Новая игра</button>
</div>

<!-- 📦 ПОДКЛЮЧЕНИЕ ГЕРОЕВ -->
<script src="heroes.js"></script>

<script>
let answer;
let gameOver = false;

function startGame() {
  answer = heroes[Math.floor(Math.random() * heroes.length)];
  document.getElementById("board").innerHTML =
    document.getElementById("headerRow").outerHTML;

  document.getElementById("winScreen").style.display = "none";
  document.getElementById("input").disabled = false;
  gameOver = false;

  console.log("Ответ:", answer.name);
}

function showSuggestions() {
  const input = document.getElementById("input").value.toLowerCase();
  const box = document.getElementById("suggestions");
  box.innerHTML = "";

  if (!input) return;

  heroes
    .filter(h => h.name.includes(input))
    .slice(0, 6)
    .forEach(h => {
      const div = document.createElement("div");
      div.className = "suggestion";
      div.innerHTML = `<img src="${h.img}">${h.name}`;
      div.onclick = () => selectHero(h.name);
      box.appendChild(div);
    });
}

function selectHero(name) {
  document.getElementById("suggestions").innerHTML = "";
  guess(name);
}

function color(val, correct) {
  return val === correct ? "green" : "red";
}

function roleColor(roles) {
  if (JSON.stringify(roles) === JSON.stringify(answer.roles)) return "green";
  if (roles.some(r => answer.roles.includes(r))) return "yellow";
  return "red";
}

function arrow(val, correct) {
  if (val === correct) return {class:"green", text:val};
  if (val < correct) return {class:"yellow", text:val + " ⬆️"};
  return {class:"yellow", text:val + " ⬇️"};
}

function guess(name) {
  if (gameOver) return;

  const hero = heroes.find(h => h.name === name);
  if (!hero) return;

  const row = document.createElement("div");
  row.className = "row";

  if (document.getElementById("gender").checked)
    row.innerHTML += `<div class="cell ${color(hero.gender,answer.gender)}">${hero.gender}</div>`;

  if (document.getElementById("race").checked)
    row.innerHTML += `<div class="cell ${color(hero.race,answer.race)}">${hero.race}</div>`;

  if (document.getElementById("roles").checked)
    row.innerHTML += `<div class="cell ${roleColor(hero.roles)}">${hero.roles.join(",")}</div>`;

  if (document.getElementById("attr").checked)
    row.innerHTML += `<div class="cell ${color(hero.attr,answer.attr)}">${hero.attr}</div>`;

  if (document.getElementById("complexity").checked) {
    let res = arrow(hero.complexity, answer.complexity);
    row.innerHTML += `<div class="cell ${res.class}">${res.text}</div>`;
  }

  if (document.getElementById("attack").checked)
    row.innerHTML += `<div class="cell ${color(hero.attack,answer.attack)}">${hero.attack}</div>`;

  if (document.getElementById("year").checked) {
    let res = arrow(hero.year, answer.year);
    row.innerHTML += `<div class="cell ${res.class}">${res.text}</div>`;
  }

  document.getElementById("board").appendChild(row);

  if (hero.name === answer.name) {
    gameOver = true;
    document.getElementById("input").disabled = true;
    document.getElementById("winScreen").style.display = "block";
  }

  document.getElementById("input").value = "";
}

startGame();
</script>

</body>
</html>
