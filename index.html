<!DOCTYPE html>
<html>
<head>
  <title>Dota Guess</title>
  <style>
    body {
      background: #0b1220;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin: 20px;
    }

    input {
      padding: 12px;
      width: 260px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      background: #1e293b;
      color: white;
    }

    .suggestions {
      width: 260px;
      margin: auto;
      background: #1e293b;
      border-radius: 8px;
      overflow: hidden;
    }

    .suggestion {
      padding: 10px;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .suggestion:hover {
      background: #334155;
    }

    .suggestion img {
      width: 32px;
      margin-right: 10px;
      border-radius: 4px;
    }

    .table {
      margin-top: 20px;
      display: inline-block;
    }

    .row {
      display: flex;
      justify-content: center;
    }

    .cell {
      width: 110px;
      padding: 10px;
      margin: 3px;
      border-radius: 6px;
      font-size: 14px;
    }

    .header .cell {
      background: #1e293b;
      font-weight: bold;
    }

    .green { background: #22c55e; }
    .yellow { background: #eab308; color: black; }
    .red { background: #ef4444; }

    #winScreen {
      display: none;
      margin-top: 20px;
      font-size: 24px;
    }

    button {
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

  </style>
</head>
<body>

<h1>Угадай героя Dota 2</h1>

<input id="input" placeholder="Начни вводить..." oninput="showSuggestions()">
<div id="suggestions" class="suggestions"></div>

<div class="table" id="board">
  <div class="row header">
    <div class="cell">Имя</div>
    <div class="cell">Роль</div>
    <div class="cell">Атрибут</div>
    <div class="cell">Атака</div>
  </div>
</div>

<div id="winScreen">
  🎉 ПОБЕДА! 🎉<br>
  <button onclick="startGame()">Новая игра</button>
</div>

<script>
let heroes = [];
let answer;
let gameOver = false;

// 🔌 Загрузка всех героев
fetch("https://api.opendota.com/api/heroStats")
  .then(res => res.json())
  .then(data => {
    heroes = data.map(h => ({
      name: h.localized_name.toLowerCase(),
      roles: h.roles,
      attr: h.primary_attr,
      attack: h.attack_type,
      img: "https://cdn.cloudflare.steamstatic.com" + h.img
    }));

    startGame();
  });

function startGame() {
  answer = heroes[Math.floor(Math.random()*heroes.length)];
  document.getElementById("board").innerHTML =
    document.querySelector(".header").outerHTML;
  document.getElementById("winScreen").style.display = "none";
  document.getElementById("input").disabled = false;
  gameOver = false;
}

function showSuggestions() {
  const input = document.getElementById("input").value.toLowerCase();
  const box = document.getElementById("suggestions");
  box.innerHTML = "";

  if (!input) return;

  heroes
    .filter(h => h.name.includes(input))
    .slice(0, 6)
    .forEach(h => {
      const div = document.createElement("div");
      div.className = "suggestion";
      div.innerHTML = `<img src="${h.img}">${h.name}`;
      div.onclick = () => selectHero(h.name);
      box.appendChild(div);
    });
}

function selectHero(name) {
  document.getElementById("suggestions").innerHTML = "";
  guess(name);
}

function color(val, correct) {
  return val === correct ? "green" : "red";
}

function roleColor(roles) {
  if (JSON.stringify(roles) === JSON.stringify(answer.roles)) return "green";
  if (roles.some(r => answer.roles.includes(r))) return "yellow";
  return "red";
}

function guess(name) {
  if (gameOver) return;

  const hero = heroes.find(h => h.name === name);
  if (!hero) return;

  const row = document.createElement("div");
  row.className = "row";

  row.innerHTML += `<div class="cell ${hero.name===answer.name?"green":"red"}">${hero.name}</div>`;
  row.innerHTML += `<div class="cell ${roleColor(hero.roles)}">${hero.roles.join(",")}</div>`;
  row.innerHTML += `<div class="cell ${color(hero.attr,answer.attr)}">${hero.attr}</div>`;
  row.innerHTML += `<div class="cell ${color(hero.attack,answer.attack)}">${hero.attack}</div>`;

  document.getElementById("board").appendChild(row);

  if (hero.name === answer.name) {
    gameOver = true;
    document.getElementById("input").disabled = true;
    document.getElementById("winScreen").style.display = "block";
  }

  document.getElementById("input").value = "";
}
</script>

</body>
</html>
