<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dota Guess</title>

<style>
body {
  margin:0;
  min-height:100vh;
  background: linear-gradient(135deg, #0b1020, #1e293b);
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
}

.container {
  width:1000px;
  padding:30px 20px;
  text-align:center;
}

/* SETTINGS */
.settings {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-bottom:25px;
}

.settings label {
  margin:0 10px;
}

/* SEARCH */
.search {
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:20px;
}

#input {
  padding:12px;
  width:300px;
  border-radius:10px;
  border:none;
  outline:none;
  background:#e5e7eb;
  color:black;
}

#suggestions {
  width:300px;
  background:#1e293b;
  border-radius:10px;
  margin-top:5px;
  overflow:hidden;
}

#suggestions div {
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  cursor:pointer;
}

#suggestions div:hover {
  background:#334155;
}

/* TABLE */
.header {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:20px;
}

.header div {
  background:#1e293b;
  padding:10px 15px;
  border-radius:10px;
  font-size:14px;
}

/* CARDS */
.row {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
  flex-wrap:wrap;
}

.cell {
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  min-width:90px;
  text-align:center;
  font-size:14px;
}

/* HERO CARD */
.hero {
  display:flex;
  flex-direction:column;
  align-items:center;
}

.hero img {
  width:50px;
  border-radius:8px;
}

/* COLORS */
.green { background:#22c55e; }
.yellow { background:#facc15; color:black; }
.red { background:#ef4444; }

</style>
</head>

<body>

<div class="container">

<h1>🎮 Угадай героя Dota 2</h1>

<div class="settings">
  <h3>Настройки</h3>

  Попытки:
  <input type="number" id="attempts" value="8" min="1" max="50">

  <br><br>

  <label><input type="checkbox" checked id="gender"> Gender</label>
  <label><input type="checkbox" checked id="race"> Race</label>
  <label><input type="checkbox" checked id="role"> Role</label>
  <label><input type="checkbox" checked id="year"> Year</label>

  <br><br>
  <button onclick="applySettings()">Начать игру</button>
</div>

<div class="search">
  <input id="input" placeholder="Введите героя..." oninput="showSuggestions()">
  <div id="suggestions"></div>
</div>

<div class="header">
  <div>Hero</div>
  <div>Gender</div>
  <div>Race</div>
  <div>Role</div>
  <div>Attr</div>
  <div>Complexity</div>
  <div>Attack</div>
  <div>Year</div>
</div>

<div id="board"></div>

<h2 id="win" style="display:none;">Победа 🎉</h2>

</div>

<script src="extraData.js"></script>

<script>
let heroes = [];
let answer;
let used = [];
let tries = 0;

let settings = {
  attempts: 8,
  useGender: true,
  useRace: true,
  useRole: true,
  useYear: true
};

function normalizeName(name){
  return name.toLowerCase().replace(/[^a-z ]/g,"").trim();
}

async function loadHeroes(){
  let res = await fetch("https://api.opendota.com/api/heroStats");
  let data = await res.json();

  heroes = data.map(h=>{
    let name = normalizeName(h.localized_name);
    let extraData = extra[name] ?? {};

    return {
      name,
      display: h.localized_name,
      attr: h.primary_attr,
      attack: h.attack_type.toLowerCase(),
      gender: extraData.gender ?? "unknown",
      race: extraData.race ?? "unknown",
      role: extraData.role ?? "unknown",
      complexity: extraData.complexity ?? 2,
      year: extraData.year ?? 2011,
      img: "https://cdn.cloudflare.steamstatic.com"+h.img
    }
  });
}

function applySettings(){
  settings.attempts = +document.getElementById("attempts").value;
  settings.useGender = document.getElementById("gender").checked;
  settings.useRace = document.getElementById("race").checked;
  settings.useRole = document.getElementById("role").checked;
  settings.useYear = document.getElementById("year").checked;

  startGame();
}

function startGame(){
  answer = heroes[Math.floor(Math.random()*heroes.length)];
  board.innerHTML = "";
  used = [];
  tries = 0;
  win.style.display = "none";
}

function showSuggestions(){
  if(heroes.length === 0) return;

  let val = normalizeName(input.value);
  suggestions.innerHTML = "";

  if(val.length < 1) return;

  heroes
    .filter(h=>h.name.includes(val))
    .slice(0,5)
    .forEach(h=>{
      let d=document.createElement("div");
      d.innerHTML = `<img src="${h.img}" width="30"> ${h.display}`;
      d.onclick=()=>guess(h.name);
      suggestions.appendChild(d);
    });
}

function color(a,b){
  return a===b ? "green" : "red";
}

function arrow(a,b){
  if(a===b) return {c:"green", t:a};
  return a<b
    ? {c:"yellow", t:a+" ↑"}
    : {c:"yellow", t:a+" ↓"};
}

function guess(name){
  if(!name || used.includes(name)) return;

  let hero = heroes.find(h=>h.name===name);
  if(!hero) return;

  used.push(name);
  tries++;

  let row=document.createElement("div");
  row.className="row";

  row.innerHTML += `<div class="cell hero">
    <img src="${hero.img}">
    ${hero.display}
  </div>`;

  row.innerHTML += `<div class="cell ${color(hero.gender,answer.gender)}">${hero.gender}</div>`;
  row.innerHTML += `<div class="cell ${color(hero.race,answer.race)}">${hero.race}</div>`;
  row.innerHTML += `<div class="cell ${color(hero.role,answer.role)}">${hero.role}</div>`;
  row.innerHTML += `<div class="cell ${color(hero.attr,answer.attr)}">${hero.attr}</div>`;

  let c = arrow(hero.complexity,answer.complexity);
  row.innerHTML += `<div class="cell ${c.c}">${c.t}</div>`;

  row.innerHTML += `<div class="cell ${color(hero.attack,answer.attack)}">${hero.attack}</div>`;

  let y = arrow(hero.year,answer.year);
  row.innerHTML += `<div class="cell ${y.c}">${y.t}</div>`;

  board.appendChild(row);

  if(hero.name === answer.name){
    win.style.display="block";
    setTimeout(startGame,2000);
    return;
  }

  if(tries >= settings.attempts){
    alert("Проиграл! Это был: " + answer.display);
    startGame();
  }

  input.value="";
  suggestions.innerHTML="";
}

loadHeroes().then(() => startGame());
</script>

</body>
</html>
