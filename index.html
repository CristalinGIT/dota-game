<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dota Guess</title>

<style>
body {
  background: #0b1020;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 { margin-bottom: 10px; }

.settings {
  margin-bottom: 15px;
}

.settings label {
  margin: 5px;
}

input {
  padding: 10px;
  width: 250px;
  border-radius: 6px;
  border: none;
}

.suggestions {
  width: 250px;
  margin: auto;
  background: #1a2238;
  border-radius: 6px;
}

.suggestion {
  padding: 8px;
  display: flex;
  align-items: center;
  cursor: pointer;
}

.suggestion:hover { background: #2d3a63; }

.suggestion img {
  width: 30px;
  margin-right: 10px;
}

.table {
  margin-top: 20px;
  display: inline-block;
}

.row {
  display: flex;
}

.cell {
  width: 110px;
  padding: 10px;
  margin: 3px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: bold;
}

.green { background: #22c55e; }
.yellow { background: #facc15; color: black; }
.red { background: #ef4444; }

.header .cell {
  background: #1a2238;
}

#winScreen {
  display: none;
  margin-top: 20px;
  font-size: 22px;
}

button {
  padding: 10px;
  border-radius: 6px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Угадай героя Dota 2</h1>

<div class="settings">
<label><input type="checkbox" id="gender" checked> Пол</label>
<label><input type="checkbox" id="race" checked> Раса</label>
<label><input type="checkbox" id="role" checked> Роль</label>
<label><input type="checkbox" id="attr" checked> Атрибут</label>
<label><input type="checkbox" id="complexity" checked> Сложность</label>
<label><input type="checkbox" id="attack" checked> Атака</label>
<label><input type="checkbox" id="year" checked> Год</label>
</div>

<input id="input" placeholder="Начни вводить..." oninput="showSuggestions()">
<div id="suggestions" class="suggestions"></div>

<div class="table" id="board"></div>

<div id="winScreen">
🎉 ПОБЕДА! 🎉<br>
<button onclick="startGame()">Новая игра</button>
</div>

<script src="heroes.js"></script>

<script>
let answer;
let gameOver = false;

function startGame() {
  answer = heroes[Math.floor(Math.random()*heroes.length)];
  document.getElementById("board").innerHTML = createHeader();
  document.getElementById("winScreen").style.display = "none";
  input.disabled = false;
  gameOver = false;
}

function createHeader() {
  let html = '<div class="row header">';
  if (gender.checked) html += '<div class="cell">Пол</div>';
  if (race.checked) html += '<div class="cell">Раса</div>';
  if (role.checked) html += '<div class="cell">Роль</div>';
  if (attr.checked) html += '<div class="cell">Атрибут</div>';
  if (complexity.checked) html += '<div class="cell">Сложн.</div>';
  if (attack.checked) html += '<div class="cell">Атака</div>';
  if (year.checked) html += '<div class="cell">Год</div>';
  html += '</div>';
  return html;
}

function showSuggestions() {
  const val = input.value.toLowerCase();
  suggestions.innerHTML = "";

  heroes.filter(h => h.name.includes(val)).slice(0,5).forEach(h => {
    const div = document.createElement("div");
    div.className = "suggestion";
    div.innerHTML = `<img src="${h.img}">${h.name}`;
    div.onclick = () => guess(h.name);
    suggestions.appendChild(div);
  });
}

function color(a,b){ return a===b?"green":"red"; }

function arrow(a,b){
  if(a===b) return {c:"green",t:a};
  return a<b?{c:"yellow",t:a+" ⬆️"}:{c:"yellow",t:a+" ⬇️"};
}

function guess(name){
  if(gameOver) return;

  const hero = heroes.find(h=>h.name===name);
  const row = document.createElement("div");
  row.className="row";

  if (gender.checked)
    row.innerHTML += `<div class="cell ${color(hero.gender,answer.gender)}">${hero.gender}</div>`;

  if (race.checked)
    row.innerHTML += `<div class="cell ${color(hero.race,answer.race)}">${hero.race}</div>`;

  if (role.checked)
    row.innerHTML += `<div class="cell ${color(hero.role,answer.role)}">${hero.role}</div>`;

  if (attr.checked)
    row.innerHTML += `<div class="cell ${color(hero.attr,answer.attr)}">${hero.attr}</div>`;

  if (complexity.checked){
    let r=arrow(hero.complexity,answer.complexity);
    row.innerHTML += `<div class="cell ${r.c}">${r.t}</div>`;
  }

  if (attack.checked)
    row.innerHTML += `<div class="cell ${color(hero.attack,answer.attack)}">${hero.attack}</div>`;

  if (year.checked){
    let r=arrow(hero.year,answer.year);
    row.innerHTML += `<div class="cell ${r.c}">${r.t}</div>`;
  }

  board.appendChild(row);

  if(hero.name===answer.name){
    gameOver=true;
    input.disabled=true;
    winScreen.style.display="block";
  }

  input.value="";
}

startGame();
</script>

</body>
</html>
