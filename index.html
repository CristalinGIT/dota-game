<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dota Guess</title>

<style>
body {
  background: #0b1020;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

input {
  padding: 12px;
  width: 260px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

.suggestions {
  width: 260px;
  margin: auto;
  background: #1a2238;
  border-radius: 8px;
  overflow: hidden;
}

.suggestion {
  padding: 10px;
  display: flex;
  align-items: center;
  cursor: pointer;
}

.suggestion:hover {
  background: #2d3a63;
}

.suggestion img {
  width: 32px;
  margin-right: 10px;
  border-radius: 4px;
}

.table {
  margin-top: 20px;
  display: inline-block;
}

.row {
  display: flex;
}

.cell {
  width: 110px;
  padding: 10px;
  margin: 3px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: bold;
}

.green { background: #2ecc71; }
.yellow { background: #f1c40f; color: black; }
.red { background: #e74c3c; }

.header .cell {
  background: #1a2238;
}

#winScreen {
  display: none;
  margin-top: 20px;
  font-size: 24px;
}

button {
  padding: 10px 15px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #3b82f6;
  color: white;
}
</style>
</head>

<body>

<h1>Угадай героя Dota 2</h1>

<!-- настройки -->
<div>
<label><input type="checkbox" id="gender" checked> Пол</label>
<label><input type="checkbox" id="race" checked> Раса</label>
<label><input type="checkbox" id="roles" checked> Роль</label>
<label><input type="checkbox" id="attr" checked> Атрибут</label>
<label><input type="checkbox" id="complexity" checked> Сложность</label>
<label><input type="checkbox" id="attack" checked> Атака</label>
<label><input type="checkbox" id="year" checked> Год</label>
</div>

<br>

<input id="input" placeholder="Начни вводить..." oninput="showSuggestions()">
<div id="suggestions" class="suggestions"></div>

<div class="table" id="board"></div>

<div id="winScreen">
🎉 ПОБЕДА! 🎉<br>
<button onclick="startGame()">Новая игра</button>
</div>

<script src="heroes.js"></script>

<script>
let answer;
let gameOver = false;

function startGame() {
  answer = heroes[Math.floor(Math.random()*heroes.length)];
  document.getElementById("board").innerHTML = "";
  document.getElementById("winScreen").style.display = "none";
  document.getElementById("input").disabled = false;
  gameOver = false;
}

function showSuggestions() {
  const input = document.getElementById("input").value.toLowerCase();
  const box = document.getElementById("suggestions");
  box.innerHTML = "";

  heroes.filter(h => h.name.includes(input)).slice(0,5).forEach(h => {
    const div = document.createElement("div");
    div.className = "suggestion";
    div.innerHTML = `<img src="${h.img}">${h.name}`;
    div.onclick = () => selectHero(h.name);
    box.appendChild(div);
  });
}

function selectHero(name) {
  document.getElementById("suggestions").innerHTML = "";
  guess(name);
}

function color(val, correct) {
  return val === correct ? "green" : "red";
}

function roleColor(roles) {
  if (JSON.stringify(roles) === JSON.stringify(answer.roles)) return "green";
  if (roles.some(r => answer.roles.includes(r))) return "yellow";
  return "red";
}

function arrow(val, correct) {
  if (val === correct) return {class:"green", text:val};
  if (val < correct) return {class:"yellow", text:val + " ⬆️"};
  return {class:"yellow", text:val + " ⬇️"};
}

function guess(name) {
  if (gameOver) return;

  const hero = heroes.find(h => h.name === name);
  if (!hero) return;

  const row = document.createElement("div");
  row.className = "row";

  if (gender.checked)
    row.innerHTML += `<div class="cell ${color(hero.gender,answer.gender)}">${hero.gender}</div>`;

  if (race.checked)
    row.innerHTML += `<div class="cell ${color(hero.race,answer.race)}">${hero.race}</div>`;

  if (roles.checked)
    row.innerHTML += `<div class="cell ${roleColor(hero.roles)}">${hero.roles.join(",")}</div>`;

  if (attr.checked)
    row.innerHTML += `<div class="cell ${color(hero.attr,answer.attr)}">${hero.attr}</div>`;

  if (complexity.checked) {
    let res = arrow(hero.complexity, answer.complexity);
    row.innerHTML += `<div class="cell ${res.class}">${res.text}</div>`;
  }

  if (attack.checked)
    row.innerHTML += `<div class="cell ${color(hero.attack,answer.attack)}">${hero.attack}</div>`;

  if (year.checked) {
    let res = arrow(hero.year, answer.year);
    row.innerHTML += `<div class="cell ${res.class}">${res.text}</div>`;
  }

  document.getElementById("board").appendChild(row);

  if (hero.name === answer.name) {
    gameOver = true;
    input.disabled = true;
    document.getElementById("winScreen").style.display = "block";
  }

  input.value = "";
}

startGame();
</script>

</body>
</html>
