<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dota Guess</title>

<style>
body {
  background:#0b1020;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  height:100vh;
}

h1 { margin-bottom:20px; }

input {
  padding:12px;
  width:260px;
  border-radius:8px;
  border:none;
  font-size:16px;
}

.suggestions {
  width:260px;
  background:#1a2238;
  border-radius:8px;
  margin-top:5px;
}

.suggestion {
  padding:10px;
  display:flex;
  align-items:center;
  cursor:pointer;
}

.suggestion:hover { background:#2d3a63; }

.suggestion img {
  width:32px;
  margin-right:10px;
}

.table {
  margin-top:20px;
}

.row { display:flex; }

.cell {
  width:120px;
  padding:12px;
  margin:4px;
  border-radius:8px;
  font-weight:bold;
  text-align:center;
}

.green { background:#22c55e; }
.red { background:#ef4444; }

.header .cell {
  background:#1a2238;
}

#win {
  display:none;
  margin-top:20px;
  font-size:24px;
}
</style>
</head>

<body>

<h1>Угадай героя Dota 2</h1>

<input id="input" placeholder="Начни вводить..." oninput="showSuggestions()">
<div id="suggestions" class="suggestions"></div>

<div class="table" id="board">
  <div class="row header">
    <div class="cell">Имя</div>
    <div class="cell">Атрибут</div>
    <div class="cell">Атака</div>
  </div>
</div>

<div id="win">🎉 Победа!</div>

<script>
let heroes=[];
let answer;

async function loadHeroes(){
  let res=await fetch("https://api.opendota.com/api/heroStats");
  let data=await res.json();

  heroes=data.map(h=>({
    name:h.localized_name.toLowerCase(),
    attr:h.primary_attr,
    attack:h.attack_type.toLowerCase(),
    img:"https://cdn.cloudflare.steamstatic.com"+h.img
  }));

  startGame();
}

function startGame(){
  answer=heroes[Math.floor(Math.random()*heroes.length)];
  board.innerHTML=`
  <div class="row header">
    <div class="cell">Имя</div>
    <div class="cell">Атрибут</div>
    <div class="cell">Атака</div>
  </div>`;
  win.style.display="none";
}

function showSuggestions(){
  let val=input.value.toLowerCase();
  suggestions.innerHTML="";

  heroes.filter(h=>h.name.includes(val)).slice(0,5).forEach(h=>{
    let d=document.createElement("div");
    d.className="suggestion";
    d.innerHTML=`<img src="${h.img}">${h.name}`;
    d.onclick=()=>guess(h.name);
    suggestions.appendChild(d);
  });
}

function color(a,b){
  return a===b?"green":"red";
}

function guess(name){
  let hero=heroes.find(h=>h.name===name);

  let row=document.createElement("div");
  row.className="row";

  row.innerHTML+=`<div class="cell ${color(hero.name,answer.name)}">${hero.name}</div>`;
  row.innerHTML+=`<div class="cell ${color(hero.attr,answer.attr)}">${hero.attr}</div>`;
  row.innerHTML+=`<div class="cell ${color(hero.attack,answer.attack)}">${hero.attack}</div>`;

  board.appendChild(row);

  if(hero.name===answer.name){
    win.style.display="block";
  }

  input.value="";
}

loadHeroes();
</script>

</body>
</html>
