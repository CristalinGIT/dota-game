<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dota Guess</title>

<style>
body {
  background: linear-gradient(135deg,#0b1020,#1e293b);
  color:white;
  font-family:Arial;
  text-align:center;
}

h1 { margin-top:20px; }

input {
  padding:12px;
  width:260px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

.suggestions {
  width:260px;
  margin:auto;
  background:#1a2238;
  border-radius:10px;
  overflow:hidden;
}

.suggestion {
  padding:10px;
  display:flex;
  align-items:center;
  cursor:pointer;
}

.suggestion:hover { background:#2d3a63; }

.suggestion img {
  width:35px;
  margin-right:10px;
}

.settings {
  margin:20px;
}

.row {
  display:flex;
  justify-content:center;
  margin-top:5px;
}

.cell {
  width:110px;
  padding:10px;
  margin:3px;
  border-radius:8px;
  font-size:13px;
}

.green{background:#22c55e;}
.yellow{background:#facc15;color:black;}
.red{background:#ef4444;}

.header .cell{
  background:#1a2238;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>🎮 Угадай героя Dota 2</h1>

<div class="settings">
  <label><input type="checkbox" value="gender" checked> Пол</label>
  <label><input type="checkbox" value="race" checked> Раса</label>
  <label><input type="checkbox" value="role" checked> Роль</label>
  <label><input type="checkbox" value="attr" checked> Атрибут</label>
  <label><input type="checkbox" value="complexity" checked> Сложность</label>
  <label><input type="checkbox" value="attack" checked> Атака</label>
  <label><input type="checkbox" value="year" checked> Год</label>
</div>

<input id="input" placeholder="Введите героя..." oninput="showSuggestions()">
<div id="suggestions" class="suggestions"></div>

<div id="board"></div>
<h2 id="win" style="display:none;">🎉 Победа!</h2>

<script src="heroes.js"></script>
<script src="extraData.js"></script>

<script>
let heroes=[];
let answer;
let activeStats=[];

function getActiveStats(){
  activeStats = Array.from(document.querySelectorAll(".settings input:checked"))
    .map(i=>i.value);
}

async function loadHeroes(){
  try{
    let res=await fetch("https://api.opendota.com/api/heroStats");
    let data=await res.json();

    heroes=data.map(h=>{
      let name=h.localized_name.toLowerCase().replace("-", "");

      return{
        name:name,
        attr:h.primary_attr,
        attack:h.attack_type.toLowerCase(),
        img:"https://cdn.cloudflare.steamstatic.com"+h.img,

        ...(extra[name] || {})
      }
    });

  }catch(e){
    heroes=window.heroes;
  }

  startGame();
}

function startGame(){
  getActiveStats();
  answer=heroes[Math.floor(Math.random()*heroes.length)];
  board.innerHTML=createHeader();
  win.style.display="none";
}

function createHeader(){
  let html=`<div class="row header">`;

  activeStats.forEach(stat=>{
    html+=`<div class="cell">${stat}</div>`;
  });

  html+=`</div>`;
  return html;
}

function showSuggestions(){
  let val=input.value.toLowerCase();
  suggestions.innerHTML="";

  heroes
    .filter(h=>h.name.includes(val))
    .slice(0,5)
    .forEach(h=>{
      let d=document.createElement("div");
      d.className="suggestion";
      d.innerHTML=`<img src="${h.img}">${h.name}`;
      d.onclick=()=>guess(h.name);
      suggestions.appendChild(d);
    });
}

function color(a,b){
  return a===b?"green":"red";
}

function arrow(a,b){
  if(a===b)return{c:"green",t:a};
  return a<b
    ?{c:"yellow",t:a+" ⬆️"}
    :{c:"yellow",t:a+" ⬇️"};
}

function guess(name){
  let hero=heroes.find(h=>h.name===name);

  let row=document.createElement("div");
  row.className="row";

  activeStats.forEach(stat=>{
    let valueHero = hero[stat];
    let valueAnswer = answer[stat];

    if(stat==="complexity" || stat==="year"){
      let r=arrow(valueHero,valueAnswer);
      row.innerHTML+=`<div class="cell ${r.c}">${r.t}</div>`;
    } else {
      row.innerHTML+=`<div class="cell ${color(valueHero,valueAnswer)}">${valueHero}</div>`;
    }
  });

  board.appendChild(row);

  if(hero.name===answer.name){
    win.style.display="block";
  }

  input.value="";
}

loadHeroes();
</script>

</body>
</html>
