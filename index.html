<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dota Guess</title>

<style>
body {
  background:#0b1020;
  color:white;
  font-family:Arial;
  text-align:center;
}

input {
  padding:10px;
  width:250px;
  border-radius:6px;
  border:none;
}

.suggestions {
  width:250px;
  margin:auto;
  background:#1a2238;
}

.suggestion {
  padding:8px;
  display:flex;
  align-items:center;
  cursor:pointer;
}

.suggestion:hover { background:#2d3a63; }

.suggestion img {
  width:30px;
  margin-right:10px;
}

.row { display:flex; }

.cell {
  width:110px;
  padding:10px;
  margin:3px;
  border-radius:6px;
  font-size:13px;
}

.green{background:#22c55e;}
.yellow{background:#facc15;color:black;}
.red{background:#ef4444;}
.header .cell{background:#1a2238;}
</style>
</head>

<body>

<h1>Угадай героя Dota 2</h1>

<input id="input" oninput="showSuggestions()">
<div id="suggestions" class="suggestions"></div>

<div id="board"></div>

<h2 id="win" style="display:none;">🎉 Победа!</h2>

<script src="extraData.js"></script>

<script>
let heroes=[];
let answer;

async function loadHeroes(){
  let res=await fetch("https://api.opendota.com/api/heroStats");
  let data=await res.json();

  heroes=data.map(h=>{
    let name=h.localized_name.toLowerCase();

    return{
      name:name,
      gender:extra[name]?.gender||"unknown",
      race:extra[name]?.race||"unknown",
      role:extra[name]?.role||"support",
      attr:h.primary_attr,
      complexity:extra[name]?.complexity||2,
      attack:h.attack_type.toLowerCase(),
      year:extra[name]?.year||2011,
      img:"https://cdn.cloudflare.steamstatic.com"+h.img
    }
  });

  startGame();
}

function startGame(){
  answer=heroes[Math.floor(Math.random()*heroes.length)];
  board.innerHTML=createHeader();
  win.style.display="none";
}

function createHeader(){
  return `<div class="row header">
  <div class="cell">Пол</div>
  <div class="cell">Раса</div>
  <div class="cell">Роль</div>
  <div class="cell">Атрибут</div>
  <div class="cell">Сложн</div>
  <div class="cell">Атака</div>
  <div class="cell">Год</div>
  </div>`;
}

function showSuggestions(){
  let val=input.value.toLowerCase();
  suggestions.innerHTML="";

  heroes.filter(h=>h.name.includes(val)).slice(0,5).forEach(h=>{
    let d=document.createElement("div");
    d.className="suggestion";
    d.innerHTML=`<img src="${h.img}">${h.name}`;
    d.onclick=()=>guess(h.name);
    suggestions.appendChild(d);
  });
}

function color(a,b){return a===b?"green":"red";}

function arrow(a,b){
  if(a===b)return{c:"green",t:a};
  return a<b?{c:"yellow",t:a+" ⬆️"}:{c:"yellow",t:a+" ⬇️"};
}

function guess(name){
  let hero=heroes.find(h=>h.name===name);

  let row=document.createElement("div");
  row.className="row";

  row.innerHTML+=`<div class="cell ${color(hero.gender,answer.gender)}">${hero.gender}</div>`;
  row.innerHTML+=`<div class="cell ${color(hero.race,answer.race)}">${hero.race}</div>`;
  row.innerHTML+=`<div class="cell ${color(hero.role,answer.role)}">${hero.role}</div>`;
  row.innerHTML+=`<div class="cell ${color(hero.attr,answer.attr)}">${hero.attr}</div>`;

  let c=arrow(hero.complexity,answer.complexity);
  row.innerHTML+=`<div class="cell ${c.c}">${c.t}</div>`;

  row.innerHTML+=`<div class="cell ${color(hero.attack,answer.attack)}">${hero.attack}</div>`;

  let y=arrow(hero.year,answer.year);
  row.innerHTML+=`<div class="cell ${y.c}">${y.t}</div>`;

  board.appendChild(row);

  if(hero.name===answer.name){
    win.style.display="block";
  }

  input.value="";
}

loadHeroes();
</script>

</body>
</html>
